<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 900 720" role="img" font-family="Helvetica, Arial, sans-serif">
  <title>OPG static component architecture</title>
  <desc>Six zones of the OPG architecture and the relationships between them: operator inputs, orchestrator core, guards catalog, model client, external runtime, outputs and artifacts.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L9 5L2 9" fill="none" stroke="#444" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L9 5L2 9" fill="none" stroke="#185FA5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <style>
    .title { font-size: 18px; font-weight: 600; fill: #1a1a1a; }
    .zone-label { font-size: 13px; font-weight: 600; }
    .box-title { font-size: 12.5px; font-weight: 600; fill: #1a1a1a; }
    .box-sub { font-size: 11px; fill: #555; }
    .legend { font-size: 11px; fill: #555; }
    .arr { stroke: #444; stroke-width: 1.2; fill: none; }
    .arr-data { stroke: #185FA5; stroke-width: 1.2; fill: none; stroke-dasharray: none; }
    .arr-config { stroke: #5F5E5A; stroke-width: 1.2; fill: none; stroke-dasharray: 4 3; }
  </style>

  <text class="title" x="450" y="30" text-anchor="middle">OPG static component architecture</text>
  <text class="legend" x="450" y="50" text-anchor="middle">Solid = control flow · Dashed gray = config load · Solid blue = data flow</text>

  <!-- Zone 1: Operator inputs (config) - top left -->
  <rect x="30" y="80" width="200" height="140" rx="10" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text class="zone-label" x="130" y="100" text-anchor="middle" fill="#444441">Operator inputs</text>
  <rect x="50" y="115" width="160" height="40" rx="6" fill="#fff" stroke="#888780" stroke-width="0.5"/>
  <text class="box-title" x="130" y="132" text-anchor="middle">operator_config.yaml</text>
  <text class="box-sub" x="130" y="148" text-anchor="middle">allowlists, rate limits, policy</text>
  <rect x="50" y="165" width="160" height="40" rx="6" fill="#fff" stroke="#888780" stroke-width="0.5"/>
  <text class="box-title" x="130" y="182" text-anchor="middle">demo graph spec</text>
  <text class="box-sub" x="130" y="198" text-anchor="middle">declarative DSL per demo</text>

  <!-- Zone 2: Orchestrator core - center -->
  <rect x="270" y="80" width="380" height="280" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="zone-label" x="460" y="100" text-anchor="middle" fill="#3C3489">Orchestrator core (opg/core/)</text>

  <!-- RunState -->
  <rect x="290" y="120" width="160" height="50" rx="6" fill="#fff" stroke="#534AB7" stroke-width="0.5"/>
  <text class="box-title" x="370" y="140" text-anchor="middle">RunState</text>
  <text class="box-sub" x="370" y="156" text-anchor="middle">messages, history, metadata</text>

  <!-- Graph runner -->
  <rect x="470" y="120" width="160" height="50" rx="6" fill="#fff" stroke="#534AB7" stroke-width="0.5"/>
  <text class="box-title" x="550" y="140" text-anchor="middle">Graph runner</text>
  <text class="box-sub" x="550" y="156" text-anchor="middle">walks Node/Edge types</text>

  <!-- The loop pattern (dashed inner box for clarity) -->
  <rect x="290" y="190" width="340" height="150" rx="8" fill="none" stroke="#7F77DD" stroke-width="0.5" stroke-dasharray="3 3"/>
  <text class="box-sub" x="300" y="206" font-style="italic">agent loop checkpoints (guards plug in here)</text>

  <rect x="300" y="218" width="100" height="36" rx="5" fill="#fff" stroke="#7F77DD" stroke-width="0.5"/>
  <text class="box-title" x="350" y="240" text-anchor="middle">assemble</text>

  <rect x="410" y="218" width="100" height="36" rx="5" fill="#fff" stroke="#7F77DD" stroke-width="0.5"/>
  <text class="box-title" x="460" y="240" text-anchor="middle">model call</text>

  <rect x="520" y="218" width="100" height="36" rx="5" fill="#fff" stroke="#7F77DD" stroke-width="0.5"/>
  <text class="box-title" x="570" y="240" text-anchor="middle">tool dispatch</text>

  <rect x="300" y="275" width="100" height="36" rx="5" fill="#fff" stroke="#7F77DD" stroke-width="0.5"/>
  <text class="box-title" x="350" y="297" text-anchor="middle">memory r/w</text>

  <rect x="410" y="275" width="100" height="36" rx="5" fill="#fff" stroke="#7F77DD" stroke-width="0.5"/>
  <text class="box-title" x="460" y="297" text-anchor="middle">checkpoint</text>

  <rect x="520" y="275" width="100" height="36" rx="5" fill="#fff" stroke="#7F77DD" stroke-width="0.5"/>
  <text class="box-title" x="570" y="297" text-anchor="middle">terminate</text>

  <!-- Zone 3: Guards catalog - right side -->
  <rect x="690" y="80" width="190" height="280" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="zone-label" x="785" y="100" text-anchor="middle" fill="#085041">Guards catalog (opg/guards/)</text>
  <rect x="710" y="115" width="150" height="32" rx="5" fill="#fff" stroke="#1D9E75" stroke-width="0.5"/>
  <text class="box-title" x="785" y="135" text-anchor="middle">allowlist</text>
  <rect x="710" y="153" width="150" height="32" rx="5" fill="#fff" stroke="#1D9E75" stroke-width="0.5"/>
  <text class="box-title" x="785" y="173" text-anchor="middle">rate_limit</text>
  <rect x="710" y="191" width="150" height="32" rx="5" fill="#fff" stroke="#1D9E75" stroke-width="0.5"/>
  <text class="box-title" x="785" y="211" text-anchor="middle">schema_validate</text>
  <rect x="710" y="229" width="150" height="32" rx="5" fill="#fff" stroke="#1D9E75" stroke-width="0.5"/>
  <text class="box-title" x="785" y="249" text-anchor="middle">acl_filter</text>
  <rect x="710" y="267" width="150" height="32" rx="5" fill="#fff" stroke="#1D9E75" stroke-width="0.5"/>
  <text class="box-title" x="785" y="287" text-anchor="middle">provenance</text>
  <rect x="710" y="305" width="150" height="32" rx="5" fill="#fff" stroke="#1D9E75" stroke-width="0.5"/>
  <text class="box-title" x="785" y="325" text-anchor="middle">blast_radius</text>

  <!-- Zone 4: Model client - bottom left -->
  <rect x="30" y="400" width="280" height="120" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text class="zone-label" x="170" y="420" text-anchor="middle" fill="#633806">Model client</text>
  <rect x="50" y="435" width="240" height="36" rx="5" fill="#fff" stroke="#BA7517" stroke-width="0.5"/>
  <text class="box-title" x="170" y="455" text-anchor="middle">model_client.py</text>
  <text class="box-sub" x="170" y="486" text-anchor="middle">OpenAI-compatible HTTP wrapper</text>
  <text class="box-sub" x="170" y="503" text-anchor="middle">→ LM Studio / Ollama / cloud</text>

  <!-- Zone 5: External runtime - bottom center -->
  <rect x="350" y="400" width="300" height="180" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="zone-label" x="500" y="420" text-anchor="middle" fill="#712B13">External runtime</text>
  <rect x="370" y="435" width="260" height="36" rx="5" fill="#fff" stroke="#D85A30" stroke-width="0.5"/>
  <text class="box-title" x="500" y="455" text-anchor="middle">MCP / tool servers</text>
  <text class="box-sub" x="500" y="466" text-anchor="middle"></text>
  <rect x="370" y="478" width="260" height="36" rx="5" fill="#fff" stroke="#D85A30" stroke-width="0.5"/>
  <text class="box-title" x="500" y="498" text-anchor="middle">retrieval index (RAG)</text>
  <rect x="370" y="521" width="260" height="36" rx="5" fill="#fff" stroke="#D85A30" stroke-width="0.5"/>
  <text class="box-title" x="500" y="541" text-anchor="middle">memory store + provenance</text>

  <!-- Zone 6: Outputs / artifacts - bottom right -->
  <rect x="690" y="400" width="190" height="180" rx="10" fill="#FBEAF0" stroke="#993556" stroke-width="0.5"/>
  <text class="zone-label" x="785" y="420" text-anchor="middle" fill="#72243E">Outputs / artifacts</text>
  <rect x="710" y="435" width="150" height="36" rx="5" fill="#fff" stroke="#D4537E" stroke-width="0.5"/>
  <text class="box-title" x="785" y="455" text-anchor="middle">audit log</text>
  <text class="box-sub" x="785" y="466" text-anchor="middle"></text>
  <rect x="710" y="478" width="150" height="36" rx="5" fill="#fff" stroke="#D4537E" stroke-width="0.5"/>
  <text class="box-title" x="785" y="498" text-anchor="middle">checkpoint store</text>
  <rect x="710" y="521" width="150" height="36" rx="5" fill="#fff" stroke="#D4537E" stroke-width="0.5"/>
  <text class="box-title" x="785" y="541" text-anchor="middle">benchmark results</text>

  <!-- Arrows -->
  <!-- config flows into orchestrator (dashed) -->
  <line x1="230" y1="135" x2="290" y2="135" class="arr-config" marker-end="url(#arrow)"/>
  <line x1="230" y1="185" x2="290" y2="185" class="arr-config" marker-end="url(#arrow)"/>

  <!-- guards plug into the loop checkpoints (solid black both directions = invocation/return)-->
  <line x1="690" y1="220" x2="630" y2="236" class="arr" marker-end="url(#arrow)"/>
  <line x1="690" y1="293" x2="630" y2="293" class="arr" marker-end="url(#arrow)"/>

  <!-- orchestrator -> model client -->
  <path d="M 350 340 L 350 380 L 170 380 L 170 400" class="arr-data" marker-end="url(#arrow-blue)"/>

  <!-- orchestrator -> external runtime (tool dispatch) -->
  <path d="M 570 340 L 570 380 L 500 380 L 500 400" class="arr-data" marker-end="url(#arrow-blue)"/>

  <!-- orchestrator writes audit log etc -->
  <path d="M 630 320 L 670 320 L 670 460 L 710 460" class="arr-data" marker-end="url(#arrow-blue)"/>

  <!-- bottom note -->
  <text class="legend" x="450" y="635" text-anchor="middle">The orchestrator core sits in Trust Domain 1; model client crosses into Domain 2; external runtime is Domain 3/4.</text>
  <text class="legend" x="450" y="652" text-anchor="middle">Guards live in Domain 1, called from the loop at every checkpoint where deterministic enforcement is required.</text>
  <text class="legend" x="450" y="669" text-anchor="middle">Each demo provides a graph spec; the orchestrator core is held constant across demos (MBT-11).</text>
</svg>
