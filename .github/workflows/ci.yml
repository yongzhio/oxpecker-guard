name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check opg tests

      - name: Format check with ruff
        run: ruff format --check opg tests

      - name: Type check with mypy
        run: mypy opg

      - name: Run unit and integration tests
        run: pytest -v --tb=short

# Live-model tests (those that require a running LM Studio / Ollama server with
# a model loaded) are NOT run in CI. They run locally via:
#   make test-live
# See benchmarks/reference_machine.md for the documented hardware/setup these
# expect.
